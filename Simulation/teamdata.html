      height: 100%;

      to { opacity: 1; }
    }

      border-radius: 15px;
      width: 90%;
      max-width: 600px;

      overflow-y: auto;

      animation: slideIn 0.3s ease;
    }

        opacity: 0;
      }
      to {

        opacity: 1;

    }

      margin-bottom: 20px;
      font-size: 2em;

      font-size: 1.3em;

function createTeamCard(teamName){
  let card = document.createElement("div");
  card.className = "team-card";
  card.innerHTML = `
    <div class="team-name">${teamName}</div>
    <button class="learn-more-btn" onclick="showTeamModal('${teamName.replace(/'/g, "\\'")}')" >Learn More</button>
  `;
  return card;
}

      <p><strong>Manager:</strong> ${info.manager}</p>
      <p><strong>Captain:</strong> ${info.captain}</p>
      <p><strong>Starting 11:</strong> ${info.starting11}</p>
      <p><strong>Substitutes:</strong> ${info.substitutes}</p>
      <div class="team-chart" style="margin-top:20px;">
        <canvas id="teamStatsChart-${teamName.replace(/\s+/g,'_')}" style="max-width:100%;height:300px"></canvas>
      </div>
    </div>
  `;
  
  // generate the chart for this team
  createTeamStatsChart(teamName, info, strength, performance, `teamStatsChart-${teamName.replace(/\s+/g,'_')}`);
  modal.style.display = "block";
}

function closeTeamModal(){
  document.getElementById("teamModal").style.display = "none";
}

// helper to render individual team statistics bar chart
// accepts performance metric and unique canvas id to avoid conflicts
function createTeamStatsChart(teamName, info, strength, performance, canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return; // safety
  const ctx = canvas.getContext('2d');

  // destroy existing chart instance if present
  if (ctx.chart) {
    ctx.chart.destroy();
  }

  const goals = parseInt(info.totalGoals) || 0;
  const homeWin = parseInt(info.homeWinPercentage) || 0;
  const awayWin = parseInt(info.awayWinPercentage) || 0;

  ctx.chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Strength', 'Goals', 'Performance %', 'Home Win %', 'Away Win %'],
      datasets: [{
        label: teamName + ' stats',
        data: [strength, goals, performance, homeWin, awayWin],
        backgroundColor: ['#4c63ff', '#ff6b6b', '#22c55e', '#fbbf24', '#06b6d4']
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          beginAtZero: true,
          ticks: { color: '#555' }
        },
        x: {
          ticks: { color: '#555' }
        }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });
}

window.onclick = function(event){
  let modal = document.getElementById("teamModal");
  if(event.target == modal){
    modal.style.display = "none";
  }
};

// Create team cards
let grid = document.getElementById("teamGrid");
for(let team in teamsStrength){
  grid.appendChild(createTeamCard(team));
}
